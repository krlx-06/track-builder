<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Track Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen-menu" class="screen">
        <div class="menu-box">
            <h1>Car Track Builder</h1>
            <button id="btn-new">Nova mapa</button>
            <button id="btn-load">Nacist mapu</button>
        </div>
    </div>

    <div id="screen-load" class="screen hidden">
        <div class="menu-box">
            <h2>Ulozene mapy</h2>
            <ul id="map-list"></ul>
            <div class="load-actions">
                <button id="btn-import-trigger">Importovat ze souboru</button>
                <input type="file" id="import-file" accept=".json" class="hidden">
                <button id="btn-back-load">Zpet</button>
            </div>
        </div>
    </div>

    <div id="screen-editor" class="screen hidden">
        <div id="toolbar">
            <div id="toolbar-left">
                <span id="map-name-display">Nova mapa</span>
                <button id="btn-rename">Prejmenovati</button>
            </div>
            <div id="tile-palette">
                <button class="palette-btn active" data-type="grass">Trava</button>
                <button class="palette-btn" data-type="road">Silnice</button>
                <button class="palette-btn" data-type="water">Voda</button>
                <button class="palette-btn" data-type="sand">Pisek</button>
                <button class="palette-btn" data-type="start">Start</button>
                <button class="palette-btn" data-type="finish">Cil</button>
            </div>
            <div id="toolbar-right">
                <button id="btn-run">Spustit auto</button>
                <button id="btn-save">Ulozit</button>
                <button id="btn-export">Exportovat</button>
                <button id="btn-clear">Vymazat</button>
                <button id="btn-menu">Menu</button>
            </div>
        </div>
        <div id="status-bar" class="hidden"></div>
        <div id="grid-container">
            <div id="grid"></div>
        </div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div id="modal-box">
            <p id="modal-message"></p>
            <input type="text" id="modal-input" class="hidden">
            <div id="modal-buttons">
                <button id="modal-confirm">OK</button>
                <button id="modal-cancel">Zrusit</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
